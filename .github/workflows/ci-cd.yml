name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: notesdb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: mvn clean test -B
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/notesdb_test
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          REDIS_HOST: localhost
          JWT_SECRET: test-secret-key-minimum-32-characters-long

  docker:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t notes-api:${{ github.sha }} .
      - name: Run container smoke test
        run: |
          docker run -d --name smoke \
            -e DATABASE_URL=jdbc:postgresql://host.docker.internal:5432/notesdb \
            -e JWT_SECRET=smoke-test-secret-32-chars-minimum \
            -p 8080:8080 notes-api:${{ github.sha }}
          sleep 15
          curl -f http://localhost:8080/actuator/health || exit 1
          docker stop smoke
